<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minimalist UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <span class="brand">Minimal</span>
      <nav class="header-nav">
        <a href="#">Work</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
      </nav>
    </div>
  </header>

  <!-- Main content -->
  <main class="main">

    <!-- Profile card -->
    <section class="card profile-card">
      <div class="profile-avatar" aria-hidden="true">
        <span class="avatar-initials">AK</span>
      </div>
      <div class="profile-info">
        <h2 class="profile-name">Anna Kovacs</h2>
        <p class="profile-role">Product Designer</p>
        <div class="profile-stats">
          <div class="stat">
            <span class="stat-value">142</span>
            <span class="stat-label">Projects</span>
          </div>
          <div class="stat-divider" aria-hidden="true"></div>
          <div class="stat">
            <span class="stat-value">38k</span>
            <span class="stat-label">Followers</span>
          </div>
          <div class="stat-divider" aria-hidden="true"></div>
          <div class="stat">
            <span class="stat-value">4.9</span>
            <span class="stat-label">Rating</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Buttons section -->
    <section class="section">
      <h3 class="section-label">Actions</h3>
      <div class="button-row">
        <button class="btn btn-primary" type="button">Get started</button>
        <button class="btn btn-secondary" type="button">Learn more</button>
        <button class="btn btn-ghost" type="button">Dismiss</button>
      </div>
    </section>

    <!-- Input section -->
    <section class="section">
      <h3 class="section-label">Input</h3>
      <div class="field">
        <label class="field-label" for="email">Email address</label>
        <input
          class="field-input"
          id="email"
          type="email"
          placeholder="you@example.com"
          autocomplete="email"
        />
      </div>
    </section>

    <!-- Badges section -->
    <section class="section">
      <h3 class="section-label">Tags</h3>
      <div class="badge-row">
        <span class="badge">Design</span>
        <span class="badge">Systems</span>
        <span class="badge">Typography</span>
        <span class="badge">Whitespace</span>
        <span class="badge">UX</span>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
