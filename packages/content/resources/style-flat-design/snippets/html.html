<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flat Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <span class="brand">
        <span class="brand-dot" aria-hidden="true"></span>
        Flatly
      </span>
      <nav class="header-nav">
        <a href="#">Explore</a>
        <a href="#">Create</a>
        <a href="#">Share</a>
      </nav>
    </div>
  </header>

  <!-- Main content -->
  <main class="main">

    <!-- Profile card -->
    <section class="card profile-card">
      <div class="card-accent-bar" aria-hidden="true"></div>
      <div class="card-body">
        <div class="profile-avatar" aria-hidden="true">
          <span class="avatar-initials">MR</span>
        </div>
        <div class="profile-info">
          <h2 class="profile-name">Marco Rivera</h2>
          <p class="profile-role">Creative Director</p>
          <div class="profile-stats">
            <div class="stat">
              <span class="stat-value">89</span>
              <span class="stat-label">Projects</span>
            </div>
            <div class="stat">
              <span class="stat-value">21k</span>
              <span class="stat-label">Likes</span>
            </div>
            <div class="stat">
              <span class="stat-value">4.8</span>
              <span class="stat-label">Rating</span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Buttons section -->
    <section class="section">
      <h3 class="section-label">Actions</h3>
      <div class="button-row">
        <button class="btn btn-primary" type="button">Follow</button>
        <button class="btn btn-secondary" type="button">Message</button>
        <button class="btn btn-ghost" type="button">Dismiss</button>
      </div>
    </section>

    <!-- Input section -->
    <section class="section">
      <h3 class="section-label">Search</h3>
      <div class="field">
        <label class="field-label" for="search">Find creators</label>
        <input
          class="field-input"
          id="search"
          type="text"
          placeholder="Search by name or tag…"
          autocomplete="off"
        />
      </div>
    </section>

    <!-- Badges section -->
    <section class="section">
      <h3 class="section-label">Categories</h3>
      <div class="badge-row">
        <span class="badge badge-coral">Illustration</span>
        <span class="badge badge-teal">Motion</span>
        <span class="badge badge-yellow">Branding</span>
        <span class="badge badge-dark">3D Art</span>
        <span class="badge badge-coral">Type</span>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
