<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Material Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- App bar (sticky header) -->
  <header class="app-bar">
    <div class="app-bar-inner">
      <span class="app-bar-title">Material</span>
      <nav class="app-bar-nav">
        <a href="#">Home</a>
        <a href="#">Library</a>
        <a href="#">Profile</a>
      </nav>
    </div>
  </header>

  <!-- Main content -->
  <main class="main">

    <!-- Profile card (elevation 2) -->
    <section class="card profile-card">
      <div class="profile-avatar" aria-hidden="true">
        <span class="avatar-initials">JS</span>
      </div>
      <div class="profile-info">
        <h2 class="profile-name">Jordan Silva</h2>
        <p class="profile-role">UX Engineer</p>
        <div class="profile-stats">
          <div class="stat">
            <span class="stat-value">212</span>
            <span class="stat-label">Commits</span>
          </div>
          <div class="stat">
            <span class="stat-value">48</span>
            <span class="stat-label">Reviews</span>
          </div>
          <div class="stat">
            <span class="stat-value">4.7</span>
            <span class="stat-label">Score</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Buttons section -->
    <section class="section">
      <h3 class="section-label">Actions</h3>
      <div class="button-row">
        <button class="btn btn-contained ripple" type="button">
          <span class="btn-label">Contained</span>
        </button>
        <button class="btn btn-outlined ripple" type="button">
          <span class="btn-label">Outlined</span>
        </button>
        <button class="btn btn-text ripple" type="button">
          <span class="btn-label">Text</span>
        </button>
      </div>
    </section>

    <!-- Input section (Material outlined text field) -->
    <section class="section">
      <h3 class="section-label">Text field</h3>
      <div class="text-field-outlined">
        <input
          class="text-field-input"
          id="username"
          type="text"
          placeholder=" "
          autocomplete="username"
        />
        <label class="text-field-label" for="username">Username</label>
        <fieldset class="text-field-outline" aria-hidden="true">
          <legend class="text-field-legend"><span>Username</span></legend>
        </fieldset>
      </div>
    </section>

    <!-- Chips section -->
    <section class="section">
      <h3 class="section-label">Chips</h3>
      <div class="chip-row">
        <span class="chip">Material</span>
        <span class="chip">Google</span>
        <span class="chip">Elevation</span>
        <span class="chip">Ripple</span>
        <span class="chip">8dp Grid</span>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
