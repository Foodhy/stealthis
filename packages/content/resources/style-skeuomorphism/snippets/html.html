<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skeuomorphism</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header / shelf -->
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-icon" aria-hidden="true">✦</span>
        <span class="brand-name">Studio</span>
      </div>
      <nav class="header-nav">
        <a href="#">Portfolio</a>
        <a href="#">Journal</a>
        <a href="#">Contact</a>
      </nav>
    </div>
  </header>

  <!-- Main content -->
  <main class="main">

    <!-- Profile card -->
    <section class="card profile-card">
      <div class="card-inner">
        <div class="profile-avatar" aria-hidden="true">
          <span class="avatar-initials">EL</span>
        </div>
        <div class="profile-info">
          <h2 class="profile-name">Eleanor Lamb</h2>
          <p class="profile-role">Illustrator &amp; Printmaker</p>
          <div class="profile-stats">
            <div class="stat">
              <span class="stat-value">76</span>
              <span class="stat-label">Works</span>
            </div>
            <div class="stat-divider" aria-hidden="true"></div>
            <div class="stat">
              <span class="stat-value">12k</span>
              <span class="stat-label">Collectors</span>
            </div>
            <div class="stat-divider" aria-hidden="true"></div>
            <div class="stat">
              <span class="stat-value">★ 4.9</span>
              <span class="stat-label">Reputation</span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Buttons section -->
    <section class="section">
      <h3 class="section-label">Actions</h3>
      <div class="button-row">
        <button class="btn btn-primary" type="button">Commission</button>
        <button class="btn btn-secondary" type="button">View Work</button>
        <button class="btn btn-ghost" type="button">Dismiss</button>
      </div>
    </section>

    <!-- Input section -->
    <section class="section">
      <h3 class="section-label">Inquiry</h3>
      <div class="field">
        <label class="field-label" for="message">Your message</label>
        <input
          class="field-input"
          id="message"
          type="text"
          placeholder="Describe your project…"
          autocomplete="off"
        />
      </div>
    </section>

    <!-- Badges section -->
    <section class="section">
      <h3 class="section-label">Specialties</h3>
      <div class="badge-row">
        <span class="badge">Etching</span>
        <span class="badge">Woodcut</span>
        <span class="badge">Watercolor</span>
        <span class="badge">Lithography</span>
        <span class="badge">Oil</span>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
