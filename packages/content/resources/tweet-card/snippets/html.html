<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tweet Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="tweet-card">
    <!-- Header -->
    <div class="tweet-header">
      <div class="tweet-avatar">
        <img
          src="https://api.dicebear.com/9.x/notionists/svg?seed=Felix"
          alt="Avatar"
          class="tweet-avatar__img"
        />
      </div>
      <div class="tweet-user">
        <div class="tweet-user__name">
          Sarah Chen
          <svg class="tweet-verified" viewBox="0 0 24 24" width="16" height="16">
            <path fill="#1d9bf0" d="M22.25 12c0-1.43-.88-2.67-2.19-3.34.46-1.39.2-2.9-.81-3.91s-2.52-1.27-3.91-.81C14.67 2.88 13.43 2 12 2s-2.67.88-3.34 2.19c-1.39-.46-2.9-.2-3.91.81s-1.27 2.52-.81 3.91C2.88 9.33 2 10.57 2 12s.88 2.67 2.19 3.34c-.46 1.39-.2 2.9.81 3.91s2.52 1.27 3.91.81C9.33 21.12 10.57 22 12 22s2.67-.88 3.34-2.19c1.39.46 2.9.2 3.91-.81s1.27-2.52.81-3.91C21.12 14.67 22 13.43 22 12zm-11.07 4.83-3.54-3.54 1.41-1.41 2.13 2.12 4.24-4.24 1.41 1.41-5.65 5.66z"/>
          </svg>
        </div>
        <div class="tweet-user__handle">@sarahchen_dev</div>
      </div>
      <svg class="tweet-logo" viewBox="0 0 24 24" width="20" height="20">
        <path fill="#71767b" d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
      </svg>
    </div>

    <!-- Body -->
    <div class="tweet-body">
      <p class="tweet-text">
        Just shipped the new dark mode for our component library. The glassmorphism
        cards look absolutely stunning against the dark backgrounds.
        <span class="tweet-hashtag">#webdev</span>
        <span class="tweet-hashtag">#ui</span>
        <span class="tweet-hashtag">#css</span>
      </p>
    </div>

    <!-- Timestamp -->
    <div class="tweet-timestamp">
      3:42 PM &middot; Mar 25, 2026
    </div>

    <!-- Divider -->
    <div class="tweet-divider"></div>

    <!-- Metrics -->
    <div class="tweet-metrics">
      <div class="tweet-metric">
        <svg viewBox="0 0 24 24" width="16" height="16">
          <path fill="currentColor" d="M1.751 10c0-4.42 3.584-8 8.005-8h4.366c4.49 0 8.129 3.64 8.129 8.13 0 2.25-.89 4.3-2.46 5.81l-5.84 5.56a2.64 2.64 0 0 1-3.62-.02l-5.88-5.6A8.12 8.12 0 0 1 1.751 10zm8.005-6a5.997 5.997 0 0 0-5.996 6c0 1.68.7 3.27 1.93 4.44l5.88 5.6c.24.22.6.22.84-.02l5.84-5.56a6.13 6.13 0 0 0 1.87-4.41C20.14 6.46 17.72 4 14.75 4H9.756z"/>
        </svg>
        <span>2,847</span>
      </div>
      <div class="tweet-metric">
        <svg viewBox="0 0 24 24" width="16" height="16">
          <path fill="currentColor" d="M4.5 3.88l4.432 4.14-1.364 1.46L5.5 7.55V16c0 1.1.896 2 2 2H13v2H7.5c-2.209 0-4-1.79-4-4V7.55L1.432 9.48.068 8.02 4.5 3.88zM16.5 6H11V4h5.5c2.209 0 4 1.79 4 4v8.45l2.068-1.93 1.364 1.46-4.432 4.14-4.432-4.14 1.364-1.46 2.068 1.93V8c0-1.1-.896-2-2-2z"/>
        </svg>
        <span>482</span>
      </div>
      <div class="tweet-metric">
        <svg viewBox="0 0 24 24" width="16" height="16">
          <path fill="currentColor" d="M1.751 10c0-4.42 3.584-8 8.005-8h4.366c4.49 0 8.129 3.64 8.129 8.13 0 2.25-.89 4.3-2.46 5.81l-5.84 5.56a2.64 2.64 0 0 1-3.62-.02l-5.88-5.6A8.12 8.12 0 0 1 1.751 10zm8.005-6a5.997 5.997 0 0 0-5.996 6c0 1.68.7 3.27 1.93 4.44l5.88 5.6c.24.22.6.22.84-.02l5.84-5.56a6.13 6.13 0 0 0 1.87-4.41C20.14 6.46 17.72 4 14.75 4H9.756z"/>
        </svg>
        <span>156</span>
      </div>
      <div class="tweet-metric">
        <svg viewBox="0 0 24 24" width="16" height="16">
          <path fill="currentColor" d="M12 2.59l5.7 5.7-1.41 1.42L13 6.41V16h-2V6.41l-3.3 3.3-1.41-1.42L12 2.59zM21 15l-.02 3.51c0 1.38-1.12 2.49-2.5 2.49H5.5C4.11 21 3 19.88 3 18.5V15h2v3.5c0 .28.22.5.5.5h12.98c.28 0 .5-.22.5-.5L19 15h2z"/>
        </svg>
        <span>Share</span>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
