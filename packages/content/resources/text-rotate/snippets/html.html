<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text Rotate</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo">
    <h1 class="demo-title">Text Rotate</h1>
    <p class="demo-sub">Animated word cycling with fade, slide, and typewriter modes.</p>

    <section class="section">
      <p class="section-label">Fade</p>
      <p class="headline">
        Built for
        <span
          class="text-rotate"
          data-words='["designers","developers","founders","creators","makers"]'
          data-mode="fade"
          data-interval="2200"
          aria-live="polite"
        >designers</span>
      </p>
    </section>

    <section class="section">
      <p class="section-label">Slide up</p>
      <p class="headline">
        Ship faster with
        <span
          class="text-rotate"
          data-words='["Astro","React","Tailwind","TypeScript","Bun"]'
          data-mode="slide"
          data-interval="2000"
          aria-live="polite"
        >Astro</span>
      </p>
    </section>

    <section class="section">
      <p class="section-label">Typewriter</p>
      <p class="headline">
        We love
        <span
          class="text-rotate"
          data-words='["open source","the web","clean code","good docs","dark mode"]'
          data-mode="type"
          data-interval="2800"
          aria-live="polite"
        >open source</span>
      </p>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
