<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Converter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="currency-widget">
        <div class="currency-card">
            <div class="input-group">
                <label>Amount</label>
                <input type="number" id="base-amount" value="1.00" step="0.01" />
            </div>

            <div class="selection-row">
                <div class="select-wrapper">
                    <label>From</label>
                    <select id="from-currency">
                        <option value="USD" selected>USD - US Dollar</option>
                        <option value="EUR">EUR - Euro</option>
                        <option value="GBP">GBP - British Pound</option>
                        <option value="JPY">JPY - Japanese Yen</option>
                        <option value="AUD">AUD - Australian Dollar</option>
                        <option value="CAD">CAD - Canadian Dollar</option>
                    </select>
                </div>

                <button id="swap-btn" class="swap-btn" aria-label="Swap Currencies">⇄</button>

                <div class="select-wrapper">
                    <label>To</label>
                    <select id="to-currency">
                        <option value="USD">USD - US Dollar</option>
                        <option value="EUR" selected>EUR - Euro</option>
                        <option value="GBP">GBP - British Pound</option>
                        <option value="JPY">JPY - Japanese Yen</option>
                        <option value="AUD">AUD - Australian Dollar</option>
                        <option value="CAD">CAD - Canadian Dollar</option>
                    </select>
                </div>
            </div>

            <div class="result-display">
                <div id="result-text" class="result-text">1.00 USD = 0.92 EUR</div>
                <div id="rate-info" class="rate-info">1 USD = 0.9248 EUR</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
