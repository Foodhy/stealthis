<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modal Enter Effect</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <button type="button" class="open-btn" id="open">Open modal</button>
  <div class="backdrop" id="backdrop" hidden>
    <div class="modal" id="modal">
      <h2>Modal</h2>
      <p>Fade + scale enter/exit.</p>
      <button type="button" class="close-btn" id="close">Close</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
