<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Hamburger Menu</title>
  </head>
  <body>
    <header class="app-header">
      <div class="logo">Brand</div>
      <button
        class="hamburger"
        id="hamburger"
        aria-label="Open navigation menu"
        aria-expanded="false"
        aria-controls="fullscreen-nav"
      >
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
    </header>

    <main class="page-content">
      <h1>Tap the menu icon</h1>
      <p>The hamburger button in the top right opens a fullscreen navigation overlay with a smooth slide-in animation and staggered link reveals.</p>
      <p>Try pressing <kbd>Escape</kbd> to close, or click any nav link.</p>
    </main>

    <nav
      class="fullscreen-nav"
      id="fullscreen-nav"
      role="dialog"
      aria-modal="true"
      aria-label="Site navigation"
    >
      <ul class="nav-list">
        <li><a href="#" class="nav-link" data-close>Home</a></li>
        <li><a href="#" class="nav-link" data-close>About</a></li>
        <li><a href="#" class="nav-link" data-close>Work</a></li>
        <li><a href="#" class="nav-link" data-close>Blog</a></li>
        <li><a href="#" class="nav-link" data-close>Contact</a></li>
      </ul>
      <div class="nav-footer">
        <a href="#">Twitter</a>
        <a href="#">GitHub</a>
        <a href="#">LinkedIn</a>
      </div>
    </nav>

    <script src="script.js"></script>
  </body>
</html>
